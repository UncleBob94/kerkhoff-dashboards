<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kerkhoff Engineering — Goal Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #242836;
      --text: #e8eaf0;
      --muted: #6b7280;
      --green: #22c55e;
      --green-dim: #166534;
      --red: #ef4444;
      --red-dim: #7f1d1d;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-area h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .logo-area h2 {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .month-selector {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-selector button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .month-selector button:hover { background: var(--border); }

    #month-label {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      min-width: 120px;
      text-align: center;
    }

    .bonus-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 28px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .bonus-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .bonus-score {
      font-size: 36px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      letter-spacing: -0.02em;
    }

    .bonus-score.on-track { color: var(--green); }
    .bonus-score.at-risk { color: var(--yellow); }
    .bonus-score.off-track { color: var(--red); }

    .bonus-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .week-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      transition: border-color 0.2s;
    }

    .week-card.qualifying { border-color: var(--green-dim); }
    .week-card.failing { border-color: var(--red-dim); }
    .week-card.in-progress { border-color: #1e3a5f; }
    .week-card.empty { opacity: 0.4; }

    .week-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .week-date {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .donut-wrapper {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .donut-container {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }

    .donut-container svg {
      width: 90px;
      height: 90px;
      transform: rotate(-90deg);
    }

    .donut-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 8;
    }

    .donut-met {
      fill: none;
      stroke: var(--green);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dasharray 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .donut-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .donut-pct {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      display: block;
    }

    .donut-pct.good { color: var(--green); }
    .donut-pct.bad { color: var(--red); }
    .donut-pct.neutral { color: var(--muted); }

    .week-stats {
      flex: 1;
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      display: inline-block;
      flex-shrink: 0;
    }

    .stat-label {
      display: flex;
      align-items: center;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }

    .week-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .week-badge.qualifying { background: var(--green-dim); color: var(--green); }
    .week-badge.failing { background: var(--red-dim); color: var(--red); }
    .week-badge.in-progress { background: #1e3a5f; color: var(--blue); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 14px;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 14px;
      color: #fca5a5;
      margin-bottom: 24px;
    }

    .target-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .target-line span {
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--yellow);
      opacity: 0.6;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    #last-updated { font-family: 'DM Mono', monospace; }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .refresh-btn:hover { border-color: var(--text); color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>Kerkhoff Engineering</h1>
    <h2>Weekly Goal Tracker</h2>
  </div>
  <div class="month-selector">
    <button id="prev-month">&#8592;</button>
    <span id="month-label">—</span>
    <button id="next-month">&#8594;</button>
  </div>
</header>

<div id="error-container"></div>

<div class="bonus-banner">
  <div>
    <div class="bonus-label">Bonus Qualifying Weeks</div>
    <div class="bonus-score" id="bonus-score">—/4</div>
    <div class="target-line"><span></span> Target: 3 of 4 weeks ≥ 80%</div>
  </div>
  <div class="bonus-status" id="bonus-status">
    <div class="status-dot" id="bonus-dot" style="background: var(--muted)"></div>
    <span id="bonus-text">Loading...</span>
  </div>
</div>

<div id="weeks-container" class="weeks-grid">
  <div class="loading"><div class="spinner"></div> Loading goals from Notion...</div>
</div>

<footer>
  <span>Last updated: <span id="last-updated">—</span></span>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</footer>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────────────
  const NOTION_TOKEN = 'ntn_S27834872162Jajd6BwwM7BmjUeGhHkNE8qDKmqw7PPdPo'; // Paste your token here
  const DATABASE_ID  = '95e1f335-27b3-4c2f-80d0-86d8336f12d9';
  const PROXY        = 'https://corsproxy.io/?';
  // ─────────────────────────────────────────────────────────────────────

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  let currentYear, currentMonth;

  function init() {
    const now = new Date();
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth();
    updateMonthLabel();
    loadData();

    document.getElementById('prev-month').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      updateMonthLabel();
      loadData();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      updateMonthLabel();
      loadData();
    });
  }

  function updateMonthLabel() {
    document.getElementById('month-label').textContent =
      `${MONTHS[currentMonth]} ${currentYear}`;
  }

  // Get all Sundays in a given month
  function getSundaysInMonth(year, month) {
    const sundays = [];
    const date = new Date(year, month, 1);
    while (date.getDay() !== 0) date.setDate(date.getDate() + 1);
    while (date.getMonth() === month) {
      sundays.push(new Date(date));
      date.setDate(date.getDate() + 7);
    }
    return sundays;
  }

  function formatDate(d) {
    return d.toISOString().split('T')[0]; // YYYY-MM-DD
  }

  function formatDisplay(d) {
    return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  }

  async function fetchAllGoals() {
    let goals = [];
    let cursor = undefined;
    const url = `${PROXY}https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;

      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${NOTION_TOKEN}`,
          'Notion-Version': '2022-06-28',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      goals = goals.concat(data.results);
      cursor = data.has_more ? data.next_cursor : undefined;
    } while (cursor);

    return goals;
  }

  function parseGoal(page) {
    const props = page.properties;
    const status   = props.Status?.select?.name || null;
    const weekOf   = props['Week Of']?.date?.start || null;
    const title    = props.Goal?.title?.[0]?.plain_text || '(untitled)';
    return { status, weekOf, title };
  }

  async function loadData() {
    const container = document.getElementById('weeks-container');
    const errorBox  = document.getElementById('error-container');
    errorBox.innerHTML = '';
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading goals from Notion...</div>';

    if (NOTION_TOKEN === 'YOUR_NOTION_TOKEN_HERE') {
      errorBox.innerHTML = `<div class="error-msg">⚠️ No Notion token set. Open this file and replace <code>YOUR_NOTION_TOKEN_HERE</code> with your integration token.</div>`;
      container.innerHTML = '';
      return;
    }

    try {
      const goals = await fetchAllGoals();
      const sundays = getSundaysInMonth(currentYear, currentMonth);
      const today = new Date(); today.setHours(0,0,0,0);

      // Group goals by their Week Of date
      const byWeek = {};
      goals.forEach(page => {
        const g = parseGoal(page);
        if (!g.weekOf) return;
        if (!byWeek[g.weekOf]) byWeek[g.weekOf] = [];
        byWeek[g.weekOf].push(g);
      });

      let qualifyingWeeks = 0;
      container.innerHTML = '';

      if (sundays.length === 0) {
        container.innerHTML = '<div class="loading">No Sundays found in this month.</div>';
        return;
      }

      sundays.forEach((sunday, i) => {
        const key     = formatDate(sunday);
        const weekGoals = byWeek[key] || [];
        const isPast  = sunday < today;
        const isToday = formatDate(sunday) === formatDate(today);

        const met    = weekGoals.filter(g => g.status === 'Met').length;
        const notMet = weekGoals.filter(g => g.status === 'Not Met').length;
        const total  = met + notMet;
        const pct    = total > 0 ? Math.round((met / total) * 100) : null;
        const qualifies = pct !== null && pct >= 80;

        if (qualifies && isPast) qualifyingWeeks++;

        // Donut math
        const r = 33;
        const circ = 2 * Math.PI * r;
        const fill = pct !== null ? (pct / 100) * circ : 0;

        let cardClass = 'empty';
        let badgeHTML = '';
        let pctClass  = 'neutral';

        if (total > 0) {
          if (!isPast && !isToday) {
            cardClass = 'in-progress';
            badgeHTML = '<div class="week-badge in-progress">Current</div>';
            pctClass  = 'neutral';
          } else if (qualifies) {
            cardClass = 'qualifying';
            badgeHTML = '<div class="week-badge qualifying">✓ Met</div>';
            pctClass  = 'good';
          } else {
            cardClass = 'failing';
            badgeHTML = '<div class="week-badge failing">✗ Missed</div>';
            pctClass  = 'bad';
          }
        }

        const inProgress = weekGoals.filter(g => g.status === 'In Progress').length;

        const card = document.createElement('div');
        card.className = `week-card ${cardClass}`;
        card.innerHTML = `
          ${badgeHTML}
          <div class="week-label">Week ${i + 1}</div>
          <div class="week-date">${formatDisplay(sunday)}</div>
          <div class="donut-wrapper">
            <div class="donut-container">
              <svg viewBox="0 0 90 90">
                <circle class="donut-bg" cx="45" cy="45" r="${r}"/>
                <circle class="donut-met" cx="45" cy="45" r="${r}"
                  stroke-dasharray="${fill} ${circ}"
                  stroke-dashoffset="0"/>
              </svg>
              <div class="donut-center">
                <span class="donut-pct ${pctClass}">
                  ${pct !== null ? pct + '%' : '—'}
                </span>
              </div>
            </div>
            <div class="week-stats">
              <div class="stat-row">
                <span class="stat-label">
                  <span class="stat-dot" style="background:var(--green)"></span>Met
                </span>
                <span class="stat-value" style="color:var(--green)">${met}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">
                  <span class="stat-dot" style="background:var(--red)"></span>Not Met
                </span>
                <span class="stat-value" style="color:var(--red)">${notMet}</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">
                  <span class="stat-dot" style="background:var(--muted)"></span>In Progress
                </span>
                <span class="stat-value" style="color:var(--muted)">${inProgress}</span>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // Bonus banner
      const scoreEl  = document.getElementById('bonus-score');
      const statusEl = document.getElementById('bonus-status');
      const dotEl    = document.getElementById('bonus-dot');
      const textEl   = document.getElementById('bonus-text');

      scoreEl.textContent = `${qualifyingWeeks}/${sundays.length}`;

      if (qualifyingWeeks >= 3) {
        scoreEl.className = 'bonus-score on-track';
        dotEl.style.background = 'var(--green)';
        textEl.textContent = 'Bonus on track';
      } else if (qualifyingWeeks === 2) {
        scoreEl.className = 'bonus-score at-risk';
        dotEl.style.background = 'var(--yellow)';
        textEl.textContent = 'At risk — need 1 more qualifying week';
      } else {
        scoreEl.className = 'bonus-score off-track';
        dotEl.style.background = 'var(--red)';
        textEl.textContent = qualifyingWeeks === 0
          ? 'No qualifying weeks yet'
          : `${3 - qualifyingWeeks} more qualifying weeks needed`;
      }

      document.getElementById('last-updated').textContent =
        new Date().toLocaleTimeString();

    } catch (err) {
      errorBox.innerHTML = `<div class="error-msg">⚠️ Failed to load data: ${err.message}</div>`;
      container.innerHTML = '';
    }
  }

  init();
</script>
</body>
</html>
