<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kerkhoff Engineering — Goal Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #191919;
      --surface: #202020;
      --border: #2d2d2d;
      --text: #e8eaf0; --muted: #6b7280;
      --green: #22c55e; --green-dim: #166534;
      --red: #ef4444; --red-dim: #7f1d1d;
      --blue: #3b82f6; --yellow: #f59e0b; --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; padding:32px 24px; }
    header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:40px; flex-wrap:wrap; gap:16px; }
    .logo-area h1 { font-size:13px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .logo-area h2 { font-size:26px; font-weight:600; color:var(--text); letter-spacing:-0.02em; }
    .block-selector { display:flex; align-items:center; gap:12px; }
    .block-selector button { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; font-family:var(--font); }
    .block-selector button:hover { background:var(--border); }
    #block-label { font-family:var(--font); font-size:13px; color:var(--text); min-width:200px; text-align:center; }
    .bonus-banner { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 28px; margin-bottom:32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .bonus-label { font-size:13px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .bonus-score { font-size:36px; font-weight:600; font-family:var(--font); letter-spacing:-0.02em; }
    .bonus-score.on-track { color:var(--green); }
    .bonus-score.at-risk  { color:var(--yellow); }
    .bonus-score.off-track { color:var(--red); }
    .bonus-status { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:500; }
    .status-dot { width:8px; height:8px; border-radius:50%; }
    .target-line { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:12px; color:var(--muted); }
    .target-line span { display:inline-block; width:24px; height:1px; background:var(--yellow); opacity:0.6; }
    .weeks-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
    .week-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; position:relative; transition:border-color 0.2s; }
    .week-card.qualifying { border-color:var(--green-dim); }
    .week-card.failing    { border-color:var(--red-dim); }
    .week-card.current    { border-color:#1e3a5f; }
    .week-card.empty      { opacity:0.4; }
    .week-label { font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .week-date  { font-family:var(--font); font-size:13px; color:var(--text); margin-bottom:20px; }
    .donut-wrapper { display:flex; align-items:center; gap:20px; }
    .donut-container { position:relative; width:90px; height:90px; flex-shrink:0; }
    .donut-container svg { width:90px; height:90px; transform:rotate(-90deg); }
    .donut-bg  { fill:none; stroke:var(--border); stroke-width:8; }
    .donut-met { fill:none; stroke:var(--green); stroke-width:8; stroke-linecap:round; transition:stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1); }
    .donut-not { fill:none; stroke:var(--red);   stroke-width:8; stroke-linecap:round; transition:stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1); }
    .donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    .donut-pct { font-family:var(--font); font-size:16px; font-weight:500; line-height:1; display:block; }
    .donut-pct.good    { color:var(--green); }
    .donut-pct.bad     { color:var(--red); }
    .donut-pct.neutral { color:var(--muted); }
    .week-stats { flex:1; }
    .stat-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; font-size:13px; }
    .stat-dot { width:6px; height:6px; border-radius:50%; margin-right:6px; display:inline-block; flex-shrink:0; }
    .stat-label { display:flex; align-items:center; color:var(--muted); }
    .stat-value { font-family:var(--font); font-size:13px; font-weight:500; }
    .week-badge { position:absolute; top:16px; right:16px; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:4px; }
    .week-badge.qualifying { background:var(--green-dim); color:var(--green); }
    .week-badge.failing    { background:var(--red-dim);   color:var(--red); }
    .week-badge.current    { background:#1e3a5f;           color:var(--blue); }
    .loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:14px; gap:10px; grid-column:1/-1; }
    .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { background:var(--red-dim); border:1px solid var(--red); border-radius:var(--radius); padding:16px 20px; font-size:14px; color:#fca5a5; margin-bottom:24px; }
    footer { margin-top:40px; font-size:12px; color:var(--muted); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    #last-updated { font-family:var(--font); }
    .refresh-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:4px 12px; font-size:12px; cursor:pointer; font-family:var(--font); transition:all 0.15s; }
    .refresh-btn:hover { border-color:var(--text); color:var(--text); }
  </style>
</head>
<body>
<header>
  <div class="logo-area">
    <h1>Kerkhoff Engineering</h1>
    <h2>Weekly Goal Tracker</h2>
  </div>
  <div class="block-selector">
    <button id="prev-block">&#8592;</button>
    <span id="block-label">—</span>
    <button id="next-block">&#8594;</button>
  </div>
</header>
<div id="error-container"></div>
<div class="bonus-banner">
  <div>
    <div class="bonus-label">Four Week Tracker</div>
    <div class="bonus-score" id="bonus-score">—/4</div>
    <div class="target-line"><span></span> Target: 3 of 4 weeks &ge; 80%</div>
  </div>
  <div class="bonus-status">
    <div class="status-dot" id="bonus-dot" style="background:var(--muted)"></div>
    <span id="bonus-text">Loading...</span>
  </div>
</div>
<div id="weeks-container" class="weeks-grid">
  <div class="loading"><div class="spinner"></div> Loading goals from Notion...</div>
</div>
<footer>
  <span>Last updated: <span id="last-updated">—</span></span>
  <button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button>
</footer>
<script>
  const NOTION_TOKEN = 'ntn_S27834872162Jajd6BwwM7BmjUeGhHkNE8qDKmqw7PPdPo';
  const DATABASE_ID  = '95e1f335-27b3-4c2f-80d0-86d8336f12d9';
  const PROXY        = 'https://corsproxy.io/?';

  // Anchor: first Sunday of 2026
  const EPOCH = new Date('2026-01-04T00:00:00');

  let currentBlock = 0;

  function getCurrentBlock() {
    const today = new Date(); today.setHours(0,0,0,0);
    const diffDays = Math.floor((today - EPOCH) / 86400000);
    return Math.max(0, Math.floor(diffDays / 28));
  }

  function getSundaysForBlock(block) {
    const sundays = [];
    for (let i = 0; i < 4; i++) {
      const d = new Date(EPOCH);
      d.setDate(EPOCH.getDate() + block * 28 + i * 7);
      sundays.push(d);
    }
    return sundays;
  }

  function formatISO(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  }

  function formatDisplay(d) {
    return d.toLocaleDateString('en-CA', { month:'short', day:'numeric' });
  }

  function updateBlockLabel() {
    const s = getSundaysForBlock(currentBlock);
    document.getElementById('block-label').textContent =
      'Block '+(currentBlock+1)+'  \u00B7  '+formatDisplay(s[0])+' \u2013 '+formatDisplay(s[3]);
  }

  function init() {
    currentBlock = getCurrentBlock();
    updateBlockLabel();
    loadData();
    document.getElementById('prev-block').addEventListener('click', () => {
      if (currentBlock > 0) { currentBlock--; updateBlockLabel(); loadData(); }
    });
    document.getElementById('next-block').addEventListener('click', () => {
      currentBlock++; updateBlockLabel(); loadData();
    });
  }

  async function fetchAllGoals() {
    let goals = [], cursor;
    const url = PROXY + 'https://api.notion.com/v1/databases/' + DATABASE_ID + '/query';
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + NOTION_TOKEN,
          'Notion-Version': '2022-06-28',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'HTTP '+res.status); }
      const data = await res.json();
      goals = goals.concat(data.results);
      cursor = data.has_more ? data.next_cursor : undefined;
    } while (cursor);
    return goals;
  }

  function parseGoal(page) {
    const p = page.properties;
    return {
      status: p.Status?.select?.name || null,
      weekOf: p['Week Of']?.date?.start || null
    };
  }

  async function loadData() {
    const container = document.getElementById('weeks-container');
    const errorBox  = document.getElementById('error-container');
    errorBox.innerHTML = '';
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading goals from Notion...</div>';

    if (NOTION_TOKEN === 'YOUR_NOTION_TOKEN_HERE') {
      errorBox.innerHTML = '<div class="error-msg">No Notion token set. Replace YOUR_NOTION_TOKEN_HERE in the file.</div>';
      container.innerHTML = '';
      return;
    }

    try {
      const goals   = await fetchAllGoals();
      const sundays = getSundaysForBlock(currentBlock);
      const today   = new Date(); today.setHours(0,0,0,0);

      const byWeek = {};
      goals.forEach(page => {
        const g = parseGoal(page);
        if (!g.weekOf) return;
        if (!byWeek[g.weekOf]) byWeek[g.weekOf] = [];
        byWeek[g.weekOf].push(g);
      });

      let qualifyingWeeks = 0;
      container.innerHTML = '';

      sundays.forEach((sunday, i) => {
        const key       = formatISO(sunday);
        const weekGoals = byWeek[key] || [];
        const isFuture  = sunday > today;
        const nextSun   = sundays[i+1];
        const isCurrent = !isFuture && (!nextSun || nextSun > today);

        const met        = weekGoals.filter(g => g.status === 'Met').length;
        const notMet     = weekGoals.filter(g => g.status === 'Not Met').length;
        const inProgress = weekGoals.filter(g => g.status === 'In Progress').length;

        // Current week: treat In Progress as red (not yet met)
        const redCount   = isCurrent ? notMet + inProgress : notMet;
        const total      = met + redCount;
        const allGoals   = met + notMet + inProgress;
        const pct        = total > 0 ? Math.round((met/total)*100) : null;
        const qualifies  = pct !== null && pct >= 80;

        if (qualifies && !isFuture && !isCurrent) qualifyingWeeks++;

        const r = 33, circ = 2*Math.PI*r;
        // Green arc covers met portion; red arc fills remainder
        const greenFill = pct !== null ? (pct/100)*circ : 0;
        // For current week with no goals yet: full red circle; otherwise proportional
        const redFill   = isCurrent && allGoals === 0 ? 0 : (total > 0 ? (redCount/total)*circ : 0);
        const redOffset = -greenFill; // red starts where green ends

        let cardClass = 'empty', badgeHTML = '', pctClass = 'neutral';

        if (isCurrent && allGoals > 0) {
          cardClass = 'current';
          badgeHTML = '<div class="week-badge current">Current</div>';
        } else if (total > 0 && !isFuture) {
          if (qualifies) {
            cardClass = 'qualifying';
            badgeHTML = '<div class="week-badge qualifying">\u2713 Met</div>';
            pctClass  = 'good';
          } else {
            cardClass = 'failing';
            badgeHTML = '<div class="week-badge failing">\u2717 Missed</div>';
            pctClass  = 'bad';
          }
        }

        const card = document.createElement('div');
        card.className = 'week-card ' + cardClass;
        card.innerHTML =
          badgeHTML +
          '<div class="week-label">Week '+(i+1)+'</div>' +
          '<div class="week-date">'+formatDisplay(sunday)+'</div>' +
          '<div class="donut-wrapper">' +
            '<div class="donut-container">' +
              '<svg viewBox="0 0 90 90">' +
                '<circle class="donut-bg"  cx="45" cy="45" r="'+r+'"/>' +
                '<circle class="donut-not" cx="45" cy="45" r="'+r+'" stroke-dasharray="'+redFill+' '+circ+'" stroke-dashoffset="'+(-greenFill)+'"/>' +
                '<circle class="donut-met" cx="45" cy="45" r="'+r+'" stroke-dasharray="'+greenFill+' '+circ+'" stroke-dashoffset="0"/>' +
              '</svg>' +
              '<div class="donut-center">' +
                '<span class="donut-pct '+pctClass+'">'+(pct !== null ? pct+'%' : '&mdash;')+'</span>' +
              '</div>' +
            '</div>' +
            '<div class="week-stats">' +
              '<div class="stat-row">' +
                '<span class="stat-label"><span class="stat-dot" style="background:var(--green)"></span>Met</span>' +
                '<span class="stat-value" style="color:var(--green)">'+met+'</span>' +
              '</div>' +
              '<div class="stat-row">' +
                '<span class="stat-label"><span class="stat-dot" style="background:var(--red)"></span>'+(isCurrent ? 'Remaining' : 'Not Met')+'</span>' +
                '<span class="stat-value" style="color:var(--red)">'+redCount+'</span>' +
              '</div>' +
            '</div>' +
          '</div>';
        container.appendChild(card);
      });

      const scoreEl = document.getElementById('bonus-score');
      const dotEl   = document.getElementById('bonus-dot');
      const textEl  = document.getElementById('bonus-text');
      scoreEl.textContent = qualifyingWeeks+'/4';

      if (qualifyingWeeks >= 3) {
        scoreEl.className = 'bonus-score on-track';
        dotEl.style.background = 'var(--green)';
        textEl.textContent = 'Bonus on track';
      } else if (qualifyingWeeks === 2) {
        scoreEl.className = 'bonus-score at-risk';
        dotEl.style.background = 'var(--yellow)';
        textEl.textContent = 'At risk \u2014 need 1 more qualifying week';
      } else {
        scoreEl.className = 'bonus-score off-track';
        dotEl.style.background = 'var(--red)';
        textEl.textContent = qualifyingWeeks === 0
          ? 'No qualifying weeks yet'
          : (3-qualifyingWeeks)+' more qualifying weeks needed';
      }

      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

    } catch(err) {
      errorBox.innerHTML = '<div class="error-msg">Failed to load data: '+err.message+'</div>';
      container.innerHTML = '';
    }
  }

  init();
</script>
</body>
</html>
